<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в CoreLine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e5e7eb;
        }

        .card {
            background: rgba(15, 23, 42, 0.92);
            border-radius: 18px;
            padding: 32px 28px 26px;
            box-shadow:
                0 24px 80px rgba(15, 23, 42, 0.9),
                0 0 0 1px rgba(148, 163, 184, 0.1);
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(18px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .logo-circle {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 10%, #f9fafb 0, #38bdf8 35%, #6366f1 75%, #0f172a 100%);
            box-shadow:
                0 0 32px rgba(56, 189, 248, 0.9),
                0 0 64px rgba(79, 70, 229, 0.6);
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .subtitle {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 22px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            font-size: 13px;
            margin-bottom: 6px;
            display: block;
            color: #d1d5db;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 9px 11px;
            border-radius: 10px;
            border: 1px solid rgba(55, 65, 81, 0.9);
            background: rgba(15, 23, 42, 0.9);
            color: #e5e7eb;
            font-size: 14px;
            outline: none;
            transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
            background: rgba(15, 23, 42, 0.95);
        }

        .error {
            font-size: 13px;
            color: #f97373;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            margin-top: 6px;
            padding: 10px 12px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: #f9fafb;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            box-shadow:
                0 12px 32px rgba(56, 189, 248, 0.3),
                0 0 0 1px rgba(15, 23, 42, 0.9);
            transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
            box-shadow:
                0 16px 40px rgba(56, 189, 248, 0.4),
                0 0 0 1px rgba(15, 23, 42, 1);
        }

        button:active {
            transform: translateY(0);
            box-shadow:
                0 8px 20px rgba(56, 189, 248, 0.25),
                0 0 0 1px rgba(15, 23, 42, 1);
        }

        .hint {
            margin-top: 14px;
            font-size: 11px;
            color: #9ca3af;
            text-align: center;
        }

        .hint code {
            background: rgba(15, 23, 42, 0.9);
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid rgba(55, 65, 81, 0.8);
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-circle"></div>
            <div>
                <div class="title">CoreLine</div>
                <div class="subtitle">Вход в веб-интерфейс</div>
            </div>
        </div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="field">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit">Войти</button>
        </form>

    </div>
</body>
</html>
